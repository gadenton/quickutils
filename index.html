<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6e5adc">
  <meta name="description" content="Flip coins, roll dice, generate random numbers and passwords — fast, offline, no tracking.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>QuickUtils</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <main>
      <!-- Coin Flip -->
      <section id="coin" class="tool-section active" aria-label="Coin Flip">
        <h1 class="tool-title">Coin Flip</h1>
        <p class="tool-subtitle">Tap the coin to flip</p>

        <div class="coin-container">
          <button id="coin-btn" class="coin" aria-label="Flip coin">
            <div class="coin-inner">
              <div class="coin-face coin-heads">H</div>
              <div class="coin-face coin-tails">T</div>
            </div>
          </button>
        </div>

        <p id="coin-result" class="result-text" aria-live="polite"></p>
      </section>

      <!-- Dice Roller -->
      <section id="dice" class="tool-section" aria-label="Dice Roller">
        <h1 class="tool-title">Dice Roller</h1>

        <div class="dice-controls">
          <label class="control-label">Type</label>
          <div class="seg-row" id="dice-type-row">
            <button class="seg-btn active" data-sides="4">d4</button>
            <button class="seg-btn" data-sides="6">d6</button>
            <button class="seg-btn" data-sides="8">d8</button>
            <button class="seg-btn" data-sides="10">d10</button>
            <button class="seg-btn" data-sides="12">d12</button>
            <button class="seg-btn" data-sides="20">d20</button>
          </div>

          <label class="control-label">Count</label>
          <div class="seg-row" id="dice-count-row">
            <button class="seg-btn active" data-count="1">1</button>
            <button class="seg-btn" data-count="2">2</button>
            <button class="seg-btn" data-count="3">3</button>
            <button class="seg-btn" data-count="4">4</button>
            <button class="seg-btn" data-count="5">5</button>
            <button class="seg-btn" data-count="6">6</button>
          </div>
        </div>

        <button id="dice-roll-btn" class="btn-primary dice-btn">Roll</button>

        <div id="dice-results" class="dice-results" aria-live="polite"></div>
        <p id="dice-sum" class="dice-sum" aria-live="polite"></p>
      </section>

      <!-- Random Number -->
      <section id="number" class="tool-section" aria-label="Random Number">
        <h1 class="tool-title">Random Number</h1>
        <p class="tool-subtitle">Pick a range, get a random integer</p>

        <div class="number-inputs">
          <div class="number-field">
            <label for="num-min" class="control-label">Min</label>
            <input id="num-min" class="input-field" type="number" value="1" inputmode="numeric">
          </div>
          <div class="number-field">
            <label for="num-max" class="control-label">Max</label>
            <input id="num-max" class="input-field" type="number" value="100" inputmode="numeric">
          </div>
        </div>

        <button id="num-generate-btn" class="btn-primary number-btn">Generate</button>

        <div id="num-result" class="number-result" aria-live="polite"></div>
      </section>

      <!-- Password Generator -->
      <section id="password" class="tool-section" aria-label="Password Generator">
        <h1 class="tool-title">Password Generator</h1>

        <div class="password-display">
          <output id="pass-output" class="pass-output">Tap Generate</output>
          <button id="pass-copy-btn" class="pass-copy-btn" aria-label="Copy password" title="Copy">
            📋
          </button>
        </div>

        <div class="password-controls">
          <div class="slider-row">
            <label for="pass-length" class="control-label">Length: <span id="pass-length-val">16</span></label>
            <input id="pass-length" type="range" min="8" max="64" value="16" class="pass-slider">
          </div>

          <div class="toggle-group">
            <label class="toggle-row">
              <span>Uppercase (A–Z)</span>
              <input type="checkbox" id="pass-upper" checked>
              <span class="toggle-switch"></span>
            </label>
            <label class="toggle-row">
              <span>Lowercase (a–z)</span>
              <input type="checkbox" id="pass-lower" checked>
              <span class="toggle-switch"></span>
            </label>
            <label class="toggle-row">
              <span>Numbers (0–9)</span>
              <input type="checkbox" id="pass-numbers" checked>
              <span class="toggle-switch"></span>
            </label>
            <label class="toggle-row">
              <span>Symbols (!@#$...)</span>
              <input type="checkbox" id="pass-symbols" checked>
              <span class="toggle-switch"></span>
            </label>
          </div>
        </div>

        <button id="pass-generate-btn" class="btn-primary password-btn">Generate</button>
        <p id="pass-feedback" class="pass-feedback" aria-live="polite"></p>
      </section>
    </main>

    <nav class="tab-bar" aria-label="Tool navigation">
      <button class="active" data-tab="coin" aria-current="page">
        <span class="tab-icon">🪙</span>
        <span>Coin</span>
      </button>
      <button data-tab="dice">
        <span class="tab-icon">🎲</span>
        <span>Dice</span>
      </button>
      <button data-tab="number">
        <span class="tab-icon">🔢</span>
        <span>Number</span>
      </button>
      <button data-tab="password">
        <span class="tab-icon">🔑</span>
        <span>Password</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
